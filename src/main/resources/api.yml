openapi: 3.0.3
info:
  title: Mini Dish API
  version: 1.0.0
  description: API REST pour la gestion des ingrédients, plats et stock.

servers:
  - url: http://localhost:8080

paths:
  /ingredients:
    get:
      summary: Récupérer la liste des ingrédients
      description: Retourne tous les ingrédients enregistrés en base.
      tags:
        - Ingredients
      responses:
        '200':
          description: Liste des ingrédients retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'

    /ingredients/{id}:
      get:
        summary: Récupérer un ingrédient par son identifiant
        description: Retourne l’ingrédient correspondant à l’identifiant fourni.
        tags:
          - Ingredients
        parameters:
          - name: id
            in: path
            required: true
            description: Identifiant de l’ingrédient
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: Ingrédient trouvé
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Ingredient'
          '404':
            description: Ingrédient non trouvé
            content:
              text/plain:
                schema:
                  type: string
                  example: Ingredient.id=1 is not found


