openapi: 3.0.3
info:
  title: Mini Dish API
  version: 1.0.0
  description: API REST pour la gestion des ingrédients, plats et stock.

servers:
  - url: http://localhost:8080

paths:
  /ingredients:
    get:
      summary: Récupérer la liste des ingrédients
      description: Retourne tous les ingrédients enregistrés en base.
      tags:
        - Ingredients
      responses:
        '200':
          description: Liste des ingrédients retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'

    /ingredients/{id}:
      get:
        summary: Récupérer un ingrédient par son identifiant
        description: Retourne l’ingrédient correspondant à l’identifiant fourni.
        tags:
          - Ingredients
        parameters:
          - name: id
            in: path
            required: true
            description: Identifiant de l’ingrédient
            schema:
              type: integer
              format: int64
        responses:
          '200':
            description: Ingrédient trouvé
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Ingredient'
          '404':
            description: Ingrédient non trouvé
            content:
              text/plain:
                schema:
                  type: string
                  example: Ingredient.id=1 is not found

    /ingredients/{id}/stock:
      get:
        summary: Récupérer le stock d’un ingrédient à un instant donné
        description: Retourne le stock d’un ingrédient selon une date/heure donnée et une unité donnée.
        tags:
          - Stock
        parameters:
          - name: id
            in: path
            required: true
            description: Identifiant de l’ingrédient
            schema:
              type: integer
              format: int64
          - name: at
            in: query
            required: true
            description: Date et heure auxquelles on veut connaître le stock
            schema:
              type: string
              format: date-time
              example: 2025-09-01T10:00:00
          - name: unit
            in: query
            required: true
            description: Unité de stock
            schema:
              type: string
              enum: [ U, G, KG, L ]
              example: KG
        responses:
          '200':
            description: Stock retourné avec succès
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/IngredientStock'
          '400':
            description: Paramètre manquant
            content:
              text/plain:
                schema:
                  type: string
                  example: Either mandatory query parameter `at` or `unit` is not provided.
          '404':
            description: Ingrédient non trouvé
            content:
              text/plain:
                schema:
                  type: string
                  example: Ingredient.id=1 is not found

  /dishes:
    get:
      summary: Récupérer la liste des plats
      description: Retourne tous les plats avec leurs ingrédients.
      tags:
        - Dishes
      responses:
        '200':
          description: Liste des plats retournée avec succès
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Dish'

  /dishes/{id}/ingredients:
    put:
      summary: Modifier les ingrédients d’un plat
      description: |
        Associe ou détache une liste d’ingrédients à un plat.
        - Si un ingrédient du body n’existe pas en base, il est ignoré.
        - Si le plat n’existe pas, on retourne 404.
        - Le body est obligatoire.
      tags:
        - Dishes
      parameters:
        - name: id
          in: path
          required: true
          description: Identifiant du plat
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        description: Liste des ingrédients à associer au plat
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/IngredientRequest'
      responses:
        '200':
          description: Ingrédients du plat mis à jour avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dish'
        '400':
          description: Corps de requête manquant ou invalide
          content:
            text/plain:
              schema:
                type: string
                example: Request body is required
        '404':
          description: Plat non trouvé
          content:
            text/plain:
              schema:
                type: string
                example: Dish.id=1 is not found

  components:
    schemas:
      Ingredient:
        type: object
        properties:
          id:
            type: integer
            format: int64
            example: 1
          name:
            type: string
            example: Tomate
          unit:
            type: string
            example: KG
          price:
            type: number
            format: double
            example: 2500.0
        required:
          - id
          - name
          - unit
          - price

      IngredientRequest:
        type: object
        properties:
          id:
            type: integer
            format: int64
            example: 1
        required:
          - id

      IngredientInDish:
        type: object
        properties:
          id:
            type: integer
            format: int64
            example: 1
          name:
            type: string
            example: Tomate
          unit:
            type: string
            example: KG
          price:
            type: number
            format: double
            example: 2500.0
        required:
          - id
          - name
          - unit
          - price

      Dish:
        type: object
        properties:
          id:
            type: integer
            format: int64
            example: 1
          name:
            type: string
            example: Salade fraîche
          available:
            type: boolean
            example: true
          price:
            type: number
            format: double
            example: 15000.0
          ingredients:
            type: array
            items:
              $ref: '#/components/schemas/IngredientInDish'
        required:
          - id
          - name
          - available
          - price
          - ingredients

      IngredientStock:
        type: object
        properties:
          id:
            type: integer
            format: int64
            example: 1
          name:
            type: string
            example: Tomate
          unit:
            type: string
            example: KG
          stock:
            type: number
            format: double
            example: 12.5
          at:
            type: string
            format: date-time
            example: 2025-09-01T10:00:00
        required:
          - id
          - name
          - unit
          - stock
          - at